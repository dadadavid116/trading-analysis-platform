# nginx.conf — Production Nginx config for the React frontend
#
# Used only in the "prod" Docker build stage (frontend/Dockerfile).
# In local dev, the Vite dev server handles everything — this file is not used.
#
# All routes serve index.html so React can handle client-side navigation.
# (The dashboard is currently a single page, but this is standard SPA practice.)

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Serve static files; fall back to index.html for any unmatched path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Do not expose Nginx version in error pages or headers.
    server_tokens off;
}
