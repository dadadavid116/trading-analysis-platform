# docker-compose.yml — Local development stack
#
# Starts seven services:
#   db        — PostgreSQL 16 (persistent data volume)
#   api       — FastAPI backend (built from backend/Dockerfile)
#   collector — Live Binance WebSocket data collectors
#   analysis  — AI market summary worker (Claude API, requires ANTHROPIC_API_KEY)
#   alerts    — Alert evaluation worker (checks conditions every minute)
#   telegram  — Telegram bot (requires TELEGRAM_BOT_TOKEN; no-op if not set)
#   frontend  — React/Vite dev server (built from frontend/Dockerfile, dev stage)
#
# Prerequisites:
#   1. Copy .env.example to .env and adjust values if needed.
#   2. Run:  docker compose up --build
#
# The frontend dev server proxies /api requests to the api service
# via the VITE_API_TARGET env var (set to http://api:8000 below).

services:

  # ── PostgreSQL database ──────────────────────────────────────────────────
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Named volume so data persists across container restarts
      - postgres_data:/var/lib/postgresql/data
      # SQL scripts here are run automatically on first database initialisation.
      # They will NOT run again unless you wipe the volume: docker compose down -v
      - ./scripts:/docker-entrypoint-initdb.d
    ports:
      # Expose to host so you can connect with a local DB tool (e.g. psql, TablePlus)
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend ──────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      # Load all vars from .env into the container
      - .env
    environment:
      # Override DATABASE_URL so "localhost" in the default is replaced by the
      # Docker service name "db" — matches the db service above.
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Share the chat_history folder so manual saves via the API write to the same place.
      - ./chat_history:/app/chat_history

  # ── React / Vite frontend (dev stage) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # Use the "dev" stage from the multi-stage Dockerfile so we get the
      # Vite dev server with hot-module replacement.
      target: dev
    restart: unless-stopped
    environment:
      # Tells vite.config.ts where to proxy /api requests.
      # "api" resolves to the api service inside the Docker network.
      VITE_API_TARGET: http://api:8000
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      # Mount source code so edits on the host are reflected immediately
      # without rebuilding the image.
      - ./frontend:/app
      # Prevent the host node_modules from overwriting the container's copy
      - /app/node_modules

  # ── AI analysis worker — DISABLED (on-demand only) ──────────────────────────
  # Auto-generation removed: the platform is now data-driven and passive.
  # AI analysis is only triggered by explicit user requests via the ChatPanel.
  # To re-enable: uncomment this block and run docker compose up -d analysis.
  #
  # analysis:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   restart: unless-stopped
  #   env_file:
  #     - .env
  #   environment:
  #     DATABASE_URL: ${DATABASE_URL}
  #   command: ["python", "-m", "analysis.run"]
  #   depends_on:
  #     db:
  #       condition: service_healthy

  # ── Alert evaluation worker ─────────────────────────────────────────────────
  alerts:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    # Override the default CMD (uvicorn) to run the alert evaluator instead.
    command: ["python", "-m", "alerts.run"]
    depends_on:
      db:
        condition: service_healthy
    # No ports — the alert worker reads from DB and writes back trigger times.

  # ── Telegram bot ────────────────────────────────────────────────────────────
  telegram:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: ["python", "-m", "telegram_bot.run"]
    depends_on:
      db:
        condition: service_healthy
    # No ports — the bot uses long polling (outbound only, no inbound connections).
    # If TELEGRAM_BOT_TOKEN is not set, the service waits and logs a warning.

  # ── Chat history export worker ──────────────────────────────────────────────
  # Wakes at 00:00 UTC daily, exports yesterday's conversations to Markdown files,
  # and prunes sessions older than CHAT_HISTORY_RETENTION_DAYS (default 60 days).
  chat_export:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: ["python", "-m", "chat_export.run"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./chat_history:/app/chat_history

  # ── Live data collectors ─────────────────────────────────────────────────────
  collector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Same DATABASE_URL override as the api service — "db" resolves inside Docker.
      DATABASE_URL: ${DATABASE_URL}
    # Override the default CMD (uvicorn) to run the collectors instead.
    command: ["python", "-m", "collectors.run_all"]
    depends_on:
      db:
        condition: service_healthy
    # No ports — the collector writes directly to the DB and does not serve HTTP.

# ── Named volumes ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
